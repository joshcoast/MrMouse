name: Release

# Builds an unsigned DMG and publishes it as a GitHub Release whenever
# a version tag is pushed. Tag format: vX.Y.Z (e.g. v1.0.0, v1.2.3).
#
# To cut a release:
#   git tag v1.2.3
#   git push origin v1.2.3

on:
  push:
    tags:
      - 'v*'
  # Allow a manual run from the Actions tab for testing. Uses the
  # version from the project if no tag triggered it.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3). Leave blank to use project default.'
        required: false
        default: ''

permissions:
  contents: write  # needed to create releases + upload assets

jobs:
  build-dmg:
    runs-on: macos-14  # Apple Silicon; macos-latest also fine
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # Pin to a recent stable Xcode. Runner images rotate versions;
        # bump this when GitHub drops older ones.
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=""
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version: ${V:-<project default>}"

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/build-dmg.sh

      - name: Upload DMG as workflow artifact
        # Handy for workflow_dispatch runs that aren't tied to a tag.
        uses: actions/upload-artifact@v4
        with:
          name: MrMouse-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## Install

            1. Download `MrMouse-${{ steps.version.outputs.version }}.dmg` below.
            2. Open the DMG and drag **MrMouse** into **Applications**.
            3. **First launch only:** right-click MrMouse in Applications → **Open** → confirm **Open**.
               macOS blocks unsigned apps by default; this one-time override tells it you trust this one.
            4. After that it launches normally from Spotlight or the menu bar.

            If you see "MrMouse is damaged and can't be opened," run this once in Terminal
            (Gatekeeper quarantine is being extra cautious):

            ```
            xattr -dr com.apple.quarantine /Applications/MrMouse.app
            ```
